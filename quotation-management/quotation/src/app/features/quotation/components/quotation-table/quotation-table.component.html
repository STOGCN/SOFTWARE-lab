<div class="quotation-layout">
  
  <app-custom-tabs 
    [tabs]="tabs" 
    [(selectedIndex)]="selectedTabIndex"
    (selectedIndexChange)="onTabChanged($event)">
  </app-custom-tabs>

  <div class="table-card">
    <app-custom-table 
      [data]="tableData" 
      [columns]="tableColumns">
    </app-custom-table>

    <app-custom-paginator
      [length]="pageLength"
      [pageSize]="pageSize"
      [pageIndex]="pageIndex"
      (pageInfoChanged)="onPageChanged($event)">
    </app-custom-paginator>
  </div>

</div>
