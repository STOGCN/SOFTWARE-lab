<div class="table-container">
  
  <app-custom-tabs 
    [tabs]="tabs" 
    [(selectedIndex)]="selectedTabIndex"
    (selectedIndexChange)="onTabChanged($event)">
  </app-custom-tabs>

  <app-custom-table 
    [data]="tableData" 
    [columns]="tableColumns">
  </app-custom-table>

  <app-custom-paginator
    [length]="pageLength"
    [pageSize]="pageSize"
    [pageIndex]="pageIndex"
    (pageInfoChanged)="onPageChanged($event)">
  </app-custom-paginator>

</div>
